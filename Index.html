<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etercuanticum IA — Asistente Universal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --accent: #7c3aed;
    --accent2: #06b6d4;

    --edu-color: #f59e0b;
    --biz-color: #10b981;
    --fun-color: #ec4899;
    --health-color: #06b6d4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .mode-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mode-tab:hover { border-color: var(--muted); color: var(--text); }

  .mode-tab.active[data-mode="edu"]   { border-color: var(--edu-color); color: var(--edu-color); background: rgba(245,158,11,0.08); }
  .mode-tab.active[data-mode="biz"]   { border-color: var(--biz-color); color: var(--biz-color); background: rgba(16,185,129,0.08); }
  .mode-tab.active[data-mode="fun"]   { border-color: var(--fun-color); color: var(--fun-color); background: rgba(236,72,153,0.08); }
  .mode-tab.active[data-mode="health"]{ border-color: var(--health-color); color: var(--health-color); background: rgba(6,182,212,0.08); }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    max-width: 560px;
    margin: auto;
    text-align: center;
    animation: fadeUp 0.6s ease forwards;
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p { color: var(--muted); font-size: 13px; line-height: 1.7; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }

  .suggestion-chip {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--text);
    transform: translateY(-2px);
  }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 760px;
    animation: fadeUp 0.3s ease forwards;
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .msg.user .msg-avatar { background: var(--accent); }
  .msg.ai   .msg-avatar { background: var(--surface); border: 1px solid var(--border); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 600px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 3px;
  }

  .msg.ai .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }

  .mode-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
    display: inline-block;
    font-weight: 500;
  }

  .mode-edu    .mode-badge { background: rgba(245,158,11,0.15); color: var(--edu-color); }
  .mode-biz    .mode-badge { background: rgba(16,185,129,0.15); color: var(--biz-color); }
  .mode-fun    .mode-badge { background: rgba(236,72,153,0.15); color: var(--fun-color); }
  .mode-health .mode-badge { background: rgba(6,182,212,0.15);  color: var(--health-color); }

  /* TYPING */
  .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* INPUT */
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    resize: none;
    min-height: 46px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 46px; height: 46px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #6d28d9; transform: scale(1.05); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Mode color accent on input focus */
  body[data-mode="edu"]    #user-input:focus { border-color: var(--edu-color); }
  body[data-mode="biz"]    #user-input:focus { border-color: var(--biz-color); }
  body[data-mode="fun"]    #user-input:focus { border-color: var(--fun-color); }
  body[data-mode="health"] #user-input:focus { border-color: var(--health-color); }
  body[data-mode="edu"]    #send-btn { background: var(--edu-color); }
  body[data-mode="biz"]    #send-btn { background: var(--biz-color); }
  body[data-mode="fun"]    #send-btn { background: var(--fun-color); }
  body[data-mode="health"] #send-btn { background: var(--health-color); }
</style>
</head>
<body data-mode="general">

<header>
  <div class="logo">ETERCUANTICUM·IA</div>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto;margin-right:12px;">
    <input id="api-key-input" type="password" placeholder="🔑 Pega tu API Key aqui"
      style="background:#12121a;border:1px solid #3a3a5a;border-radius:8px;padding:7px 12px;color:#e8e8f0;font-family:'IBM Plex Mono',monospace;font-size:11px;width:210px;outline:none;"
    />
    <a href="https://console.anthropic.com" target="_blank"
      style="font-size:10px;color:#7c3aed;text-decoration:none;white-space:nowrap;">Obtener ↗</a>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab" data-mode="edu"    onclick="setMode('edu')">📚 Educación</button>
    <button class="mode-tab" data-mode="biz"    onclick="setMode('biz')">💼 Negocios</button>
    <button class="mode-tab" data-mode="fun"    onclick="setMode('fun')">🎮 Entretenimiento</button>
    <button class="mode-tab" data-mode="health" onclick="setMode('health')">🌿 Salud</button>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome-screen">
    <h2>Hola, soy Etercuanticum IA</h2>
    <p>Selecciona un modo y pregúntame lo que quieras.<br>Estoy aquí para aprender contigo, ayudarte en el trabajo,<br>entretenerte o cuidar tu bienestar.</p>
    <div class="suggestions">
      <button class="suggestion-chip" onclick="quickSend('Explícame cómo funciona la fotosíntesis')">📚 Explícame la fotosíntesis</button>
      <button class="suggestion-chip" onclick="quickSend('Dame ideas para mejorar mi negocio online')">💼 Ideas para mi negocio</button>
      <button class="suggestion-chip" onclick="quickSend('Cuéntame un chiste gracioso')">🎮 Cuéntame un chiste</button>
      <button class="suggestion-chip" onclick="quickSend('Cómo puedo dormir mejor?')">🌿 ¿Cómo dormir mejor?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Escribe tu pregunta aquí..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
  let currentMode = 'general';
  let isLoading = false;

  const modeConfig = {
    general: {
      label: 'General',
      system: 'Eres un asistente de IA útil, amigable y versátil. Responde siempre en español de forma clara y concisa.'
    },
    edu: {
      label: '📚 Educación',
      system: 'Eres un tutor educativo experto. Explicas conceptos de forma clara, usa analogías, ejemplos prácticos y fomenta el pensamiento crítico. Responde siempre en español. Sé paciente, pedagógico y motivador.'
    },
    biz: {
      label: '💼 Negocios',
      system: 'Eres un consultor de negocios profesional. Das consejos estratégicos, prácticos y orientados a resultados. Responde siempre en español. Usa lenguaje profesional pero accesible, con ejemplos concretos.'
    },
    fun: {
      label: '🎮 Entretenimiento',
      system: 'Eres un compañero de entretenimiento creativo y divertido. Cuentas historias, haces juegos, das recomendaciones de películas/series/videojuegos, cuentas chistes y eres muy ameno. Responde siempre en español con energía y personalidad.'
    },
    health: {
      label: '🌿 Salud',
      system: 'Eres un asistente de bienestar y salud. Ofreces consejos sobre hábitos saludables, nutrición, ejercicio, sueño y bienestar mental. Responde siempre en español. Sé empático, positivo y recuerda sugerir consultar a profesionales médicos cuando sea necesario.'
    }
  };

  function setMode(mode) {
    currentMode = mode;
    document.body.setAttribute('data-mode', mode);
    document.querySelectorAll('.mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === mode);
    });
  }

  function addMessage(role, text, mode) {
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role} ${mode ? 'mode-' + mode : ''}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'ai' && mode && modeConfig[mode]) {
      const badge = document.createElement('div');
      badge.className = 'mode-badge';
      badge.textContent = modeConfig[mode].label;
      bubble.appendChild(badge);
    }

    const content = document.createElement('span');
    content.textContent = text;
    bubble.appendChild(content);

    div.appendChild(avatar);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return content;
  }

  function addTyping() {
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    const apiKey = document.getElementById('api-key-input').value.trim();
    if (!apiKey) {
      alert('⚠️ Por favor pega tu API Key de Anthropic en el campo de arriba.

Obténla gratis en: console.anthropic.com');
      return;
    }

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    const mode = currentMode === 'general' ? 'general' : currentMode;
    addMessage('user', text, null);
    addTyping();

    const systemPrompt = modeConfig[mode]?.system || modeConfig.general.system;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.error) {
        addMessage('ai', '⚠️ Error: ' + data.error.message, null);
      } else {
        const reply = data.content?.map(b => b.text || '').join('') || 'Sin respuesta.';
        addMessage('ai', reply, mode === 'general' ? null : mode);
      }

    } catch (err) {
      removeTyping();
      addMessage('ai', '⚠️ Error al conectar. Verifica tu API Key e intenta de nuevo.', null);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function quickSend(text) {
    const modeMap = {
      'Explícame cómo funciona la fotosíntesis': 'edu',
      'Dame ideas para mejorar mi negocio online': 'biz',
      'Cuéntame un chiste gracioso': 'fun',
      'Cómo puedo dormir mejor?': 'health'
    };
    if (modeMap[text]) setMode(modeMap[text]);
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  // Auto-resize textarea
  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
